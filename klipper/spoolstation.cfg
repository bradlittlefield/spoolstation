# spoolstation.cfg
# Place at: /home/lava/printer_data/config/extended/klipper/spoolstation.cfg
# Requires: Extended Firmware v1.2.0+ with OpenRFID enabled
#
# Exposes SPOOLSTATION_SYNC gcode macro callable from Fluidd/Mainsail
# Runs spoolstation_sync.sh on print start to push filament data to U1

[gcode_macro SPOOLSTATION_SYNC]
description: Pull filament data from Spoolman and push to all 4 toolhead channels
gcode:
  RESPOND PREFIX="SpoolStation" MSG="Querying Spoolman for loaded spools..."
  RUN_SHELL_COMMAND CMD=spoolstation_sync

[gcode_shell_command spoolstation_sync]
command: /home/lava/printer_data/config/extended/spoolstation_sync.sh
timeout: 10
verbose: true

[gcode_macro _PRINT_START_SPOOLSTATION]
gcode:
  RESPOND PREFIX="SpoolStation" MSG="Syncing filament data..."
  SPOOLSTATION_SYNC

[gcode_macro _PRINT_END_SPOOLSTATION]
gcode:
  RESPOND PREFIX="SpoolStation" MSG="Print complete. Weigh spools to update inventory."
